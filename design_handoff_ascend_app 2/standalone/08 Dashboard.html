document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-display: swap;\n  src: url(\"a51f3d0f-ec32-490d-af4f-2e897447df1f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f00efb1a-8931-43b1-bea6-08ca132c2035\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; padding: 0; background: #ece5db; }\n    @keyframes spinAscend { to { transform: rotate(360deg); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: #ece5db; font-family: 'Outfit', sans-serif; color: #2b211a; padding: 56px 64px 96px; box-sizing: border-box;\">\n\n  <div style=\"max-width: 880px; margin-bottom: 56px;\">\n    <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: oklch(0.55 0.12 40); margin-bottom: 12px;\">Ascend · Dashboard — Home · Android<\u002Fdiv>\n    <h1 style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 34px; font-weight: 700; margin: 0 0 16px; line-height: 1.15;\">Greeting · streak · today's usage · weekly trend · time saved<\u002Fh1>\n    <p style=\"font-size: 15.5px; line-height: 1.65; margin: 0; color: #5c5045;\">\n      <strong style=\"color: #2b211a;\">Try it:<\u002Fstrong> YouTube is deliberately over its limit to show the over-limit treatment. Tap <em>Refresh<\u002Fem> in the header to simulate a data refresh (usage ticks up live). Bottom nav: Home is active; the other tabs toast their destination until those screens exist.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div data-screen-label=\"Dashboard — Home\" style=\"display: flex; flex-direction: column; gap: 18px; width: fit-content;\">\n    <div style=\"background: #ffffff; border-radius: 28px; padding: 28px; box-shadow: 0 1px 3px rgba(43,33,26,0.06);\">\n      <x-import component=\"AndroidDevice\" from=\"c986a247-47c5-4cab-814e-b89513c8a15f#/android-frame.jsx\" hint-size=\"412px,892px\">\n        <div style=\"height: 100%; position: relative; display: flex; flex-direction: column; background: #fbf4ea; box-sizing: border-box;\">\n\n          <!-- Scrollable content -->\n          <div style=\"flex: 1; overflow: auto; padding: 14px 24px 18px; box-sizing: border-box;\">\n\n            <!-- Greeting + avatar -->\n            <div style=\"display: flex; align-items: center; gap: 14px;\">\n              <div style=\"flex: 1; display: flex; flex-direction: column; gap: 1px;\">\n                <span style=\"font-size: 14.5px; color: #9a8a78;\">{{ greeting }}<\u002Fspan>\n                <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 27px; font-weight: 800; color: #2b211a;\">EarlyBird<\u002Fspan>\n              <\u002Fdiv>\n              <span onclick=\"{{ refresh }}\" style=\"display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 500; color: #9a8a78; cursor: pointer; padding: 7px 12px; border-radius: 99px; border: 1px solid #eee2d0; background: #ffffff;\" style-hover=\"background: #f6ecdd\" style-active=\"transform: scale(0.96)\">\n                {{ refreshIcon }}\n                <span>{{ updatedLabel }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"width: 46px; height: 46px; border-radius: 50%; background: #221a13; color: #fbf4ea; display: flex; align-items: center; justify-content: center; font-family: 'Bricolage Grotesque', sans-serif; font-size: 16px; font-weight: 700; flex-shrink: 0;\">EB<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- Streak -->\n            <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 16px; background: oklch(0.62 0.15 38); border-radius: 18px; padding: 14px 18px;\">\n              <svg width=\"30\" height=\"30\" viewBox=\"0 0 64 64\">\n                <path d=\"M14 36 L32 18 L50 36\" stroke=\"#fbf4ea\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n                <path d=\"M14 52 L32 34 L50 52\" stroke=\"#fbf4ea\" stroke-width=\"9\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.4\"><\u002Fpath>\n              <\u002Fsvg>\n              <span style=\"display: flex; flex-direction: column;\">\n                <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 18px; font-weight: 800; color: #fbf4ea;\">7-day streak<\u002Fspan>\n                <span style=\"font-size: 12.5px; color: rgba(251,244,234,0.75);\">Every day this week under your limits<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- Today's usage -->\n            <div style=\"font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #9a8a78; margin: 22px 0 10px;\">Today's usage<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 9px;\">\n              <sc-for list=\"{{ usageApps }}\" as=\"app\" hint-placeholder-count=\"3\">\n                <div style=\"background: #ffffff; border: 1.5px solid {{ app.border }}; border-radius: 16px; padding: 13px 15px; box-sizing: border-box;\">\n                  <div style=\"display: flex; align-items: center; gap: 12px;\">\n                    <span style=\"width: 36px; height: 36px; border-radius: 10px; background: {{ app.chipBg }}; color: {{ app.chipColor }}; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0;\">{{ app.letter }}<\u002Fspan>\n                    <span style=\"flex: 1; font-size: 15.5px; font-weight: 500; color: #2b211a;\">{{ app.name }}<\u002Fspan>\n                    <span style=\"font-size: 13px; font-weight: 600; color: {{ app.statusColor }};\">{{ app.statusText }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display: flex; align-items: center; gap: 12px; margin-top: 10px;\">\n                    <span style=\"flex: 1; height: 7px; border-radius: 99px; background: #f0e3cf; overflow: hidden; display: block;\">\n                      <span style=\"display: block; height: 100%; border-radius: 99px; width: {{ app.barWidth }}; background: {{ app.barColor }}; transition: width 0.4s ease;\"><\u002Fspan>\n                    <\u002Fspan>\n                    <span style=\"font-size: 12.5px; font-weight: 500; color: #9a8a78; white-space: nowrap;\">{{ app.timeLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- Weekly trend + time saved -->\n            <div style=\"font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #9a8a78; margin: 22px 0 10px;\">This week<\u002Fdiv>\n            <div style=\"background: #ffffff; border: 1px solid #eee2d0; border-radius: 18px; padding: 16px 18px 12px; box-sizing: border-box;\">\n              <div style=\"display: flex; align-items: flex-end; gap: 9px; height: 86px;\">\n                <sc-for list=\"{{ weekBars }}\" as=\"d\" hint-placeholder-count=\"7\">\n                  <span style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; align-self: stretch; justify-content: flex-end;\">\n                    <span style=\"width: 100%; height: {{ d.h }}; border-radius: 6px; background: {{ d.bg }}; display: block;\"><\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display: flex; gap: 9px; margin-top: 7px;\">\n                <sc-for list=\"{{ weekBars }}\" as=\"d\" hint-placeholder-count=\"7\">\n                  <span style=\"flex: 1; text-align: center; font-size: 11px; font-weight: 500; color: {{ d.labelColor }};\">{{ d.day }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display: flex; align-items: center; gap: 16px; margin-top: 10px; background: #221a13; border-radius: 18px; padding: 16px 20px;\">\n              <span style=\"display: flex; flex-direction: column; flex: 1;\">\n                <span style=\"font-size: 12.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(251,244,234,0.6);\">Time saved<\u002Fspan>\n                <span style=\"font-size: 12.5px; color: rgba(251,244,234,0.55); margin-top: 3px;\">vs. your limits, this week<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-family: 'Bricolage Grotesque', sans-serif; font-size: 30px; font-weight: 800; color: oklch(0.78 0.13 70);\">3h 40m<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Bottom nav -->\n          <div style=\"display: flex; border-top: 1px solid #eee2d0; background: #ffffff; padding: 8px 10px 10px;\">\n            <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n              <span onclick=\"{{ n.go }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 0; cursor: pointer; border-radius: 14px;\" style-hover=\"background: rgba(43,33,26,0.04)\" style-active=\"transform: scale(0.95)\">\n                {{ n.icon }}\n                <span style=\"font-size: 11.5px; font-weight: {{ n.weight }}; color: {{ n.color }};\">{{ n.label }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          {{ toast }}\n        <\u002Fdiv>\n      <\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"font-size: 13px; color: #9a8a78;\">YouTube shows the over-limit state: coral-red bar, \"Over by 12m\", and a tinted card border.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width: 880px; margin-top: 64px; border-top: 1px solid #d9d0c2; padding-top: 24px;\">\n    <div style=\"font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #9a8a78; margin-bottom: 10px;\">Next steps<\u002Fdiv>\n    <ul style=\"font-size: 14.5px; line-height: 1.8; color: #5c5045; margin: 0; padding-left: 20px;\">\n      <li>Stats, Leaderboard and Settings screens to fill out the bottom nav.<\u002Fli>\n      <li>The intervention/challenge screen (what YouTube's over-limit state triggers).<\u002Fli>\n      <li>\"No data yet\" empty state for day one, before usage stats exist.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    usage: { ig: 38, yt: 72, tt: 22 },\n    refreshing: false,\n    toastOn: null,\n  };\n\n  componentWillUnmount() { clearTimeout(this._t); clearTimeout(this._toastT); }\n\n  fmt(min) {\n    const h = Math.floor(min / 60), m = min % 60;\n    return h ? (m ? h + 'h ' + m + 'm' : h + 'h') : m + 'm';\n  }\n\n  renderVals() {\n    const e = React.createElement;\n    const s = this.state;\n    const coral = 'oklch(0.62 0.15 38)';\n    const red = 'oklch(0.55 0.17 30)';\n\n    const hour = new Date().getHours();\n    const greeting = hour < 12 ? 'Good morning,' : hour < 18 ? 'Good afternoon,' : 'Good evening,';\n\n    const defs = [\n      { id: 'ig', name: 'Instagram', letter: 'I', hue: 340, limit: 60 },\n      { id: 'yt', name: 'YouTube', letter: 'Y', hue: 25, limit: 60 },\n      { id: 'tt', name: 'TikTok', letter: 'T', hue: 200, limit: 45 },\n    ];\n\n    const usageApps = defs.map((a) => {\n      const used = s.usage[a.id];\n      const over = used > a.limit;\n      const pct = Math.min(100, Math.round((used / a.limit) * 100));\n      return {\n        name: a.name, letter: a.letter,\n        chipBg: 'oklch(0.87 0.06 ' + a.hue + ')',\n        chipColor: 'oklch(0.42 0.1 ' + a.hue + ')',\n        border: over ? 'oklch(0.55 0.17 30 / 0.45)' : '#eee2d0',\n        barWidth: pct + '%',\n        barColor: over ? red : coral,\n        statusText: over ? 'Over by ' + this.fmt(used - a.limit) : this.fmt(a.limit - used) + ' left',\n        statusColor: over ? red : 'oklch(0.45 0.1 150)',\n        timeLabel: this.fmt(used) + ' / ' + this.fmt(a.limit),\n      };\n    });\n\n    // minutes of total monitored usage per day, Mon..Sun (today = Sunday)\n    const week = [192, 246, 168, 270, 216, 126, 84];\n    const max = Math.max.apply(null, week);\n    const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\n    const weekBars = week.map((v, i) => ({\n      day: days[i],\n      h: Math.max(10, Math.round((v / max) * 86)) + 'px',\n      bg: i === 6 ? coral : '#f0e3cf',\n      labelColor: i === 6 ? 'oklch(0.55 0.12 40)' : '#b9a98f',\n    }));\n\n    const icon = (kind, color) => {\n      const p = { width: 22, height: 22, viewBox: '0 0 24 24' };\n      if (kind === 'home') return e('svg', p, e('path', { d: 'M4 11 L12 4 L20 11 V20 H14 V14 H10 V20 H4 Z', fill: color }));\n      if (kind === 'stats') return e('svg', p,\n        e('rect', { x: 4, y: 12, width: 4, height: 8, rx: 1.2, fill: color }),\n        e('rect', { x: 10, y: 7, width: 4, height: 13, rx: 1.2, fill: color }),\n        e('rect', { x: 16, y: 10, width: 4, height: 10, rx: 1.2, fill: color }));\n      if (kind === 'board') return e('svg', p,\n        e('rect', { x: 3, y: 11, width: 5.5, height: 9, rx: 1.2, fill: color }),\n        e('rect', { x: 9.25, y: 5, width: 5.5, height: 15, rx: 1.2, fill: color }),\n        e('rect', { x: 15.5, y: 14, width: 5.5, height: 6, rx: 1.2, fill: color }));\n      return e('svg', p,\n        e('rect', { x: 4, y: 6, width: 16, height: 2.4, rx: 1.2, fill: color }),\n        e('circle', { cx: 15, cy: 7.2, r: 3, fill: color, stroke: '#ffffff', strokeWidth: 1.5 }),\n        e('rect', { x: 4, y: 15, width: 16, height: 2.4, rx: 1.2, fill: color }),\n        e('circle', { cx: 9, cy: 16.2, r: 3, fill: color, stroke: '#ffffff', strokeWidth: 1.5 }));\n    };\n\n    const navItems = [\n      { label: 'Home', kind: 'home', active: true },\n      { label: 'Stats', kind: 'stats' },\n      { label: 'Leaderboard', kind: 'board' },\n      { label: 'Settings', kind: 'sliders' },\n    ].map((n) => ({\n      label: n.label,\n      icon: icon(n.kind, n.active ? coral : '#b0a18d'),\n      color: n.active ? 'oklch(0.55 0.12 40)' : '#9a8a78',\n      weight: n.active ? '600' : '500',\n      go: n.active ? () => {} : () => {\n        clearTimeout(this._toastT);\n        this.setState({ toastOn: n.label });\n        this._toastT = setTimeout(() => this.setState({ toastOn: null }), 1800);\n      },\n    }));\n\n    const refreshIcon = e('span', {\n      style: {\n        width: 13, height: 13, borderRadius: '50%', flexShrink: 0,\n        border: '2px solid #d9cab0',\n        borderTopColor: 'oklch(0.62 0.15 38)',\n        display: 'inline-block', boxSizing: 'border-box',\n        animation: s.refreshing ? 'spinAscend 0.8s linear infinite' : 'none',\n      },\n    });\n\n    const toast = s.toastOn ? e('div', {\n      style: {\n        position: 'absolute', bottom: 110, left: '50%', transform: 'translateX(-50%)',\n        background: '#221a13', color: '#fbf4ea', fontSize: 14, fontWeight: 500,\n        fontFamily: \"'Outfit', sans-serif\", padding: '12px 20px', borderRadius: 99,\n        whiteSpace: 'nowrap', boxShadow: '0 6px 20px rgba(0,0,0,0.25)', zIndex: 30,\n      },\n    }, '\\u2192 ' + s.toastOn + ' (next screen to design)') : null;\n\n    return {\n      greeting, usageApps, weekBars, navItems, refreshIcon, toast,\n      updatedLabel: s.refreshing ? 'Refreshing\\u2026' : 'Updated just now',\n      refresh: () => {\n        if (s.refreshing) return;\n        this.setState({ refreshing: true });\n        clearTimeout(this._t);\n        this._t = setTimeout(() => this.setState((p) => ({\n          refreshing: false,\n          usage: {\n            ig: p.usage.ig + 1 + Math.floor(Math.random() * 3),\n            yt: p.usage.yt + 1 + Math.floor(Math.random() * 3),\n            tt: p.usage.tt + 1 + Math.floor(Math.random() * 2),\n          },\n        })), 900);\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
